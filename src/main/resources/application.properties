spring.application.name=bnkai
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/digitalgoldwallet}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Gold12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.servlet.context-path=/api
server.port=${SERVER_PORT:8081}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000}
spring.data.redis.repositories.enabled=false
spring.jpa.open-in-view=false
springdoc.enable-data-rest=false
springdoc.enable-hateoas=false
spring.redis.host=${SPRING_REDIS_HOST:localhost}
spring.redis.port=${SPRING_REDIS_PORT:6379}
